<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tip | CTS fantasy WC '26</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons/css/flag-icons.min.css">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<header class="topbar">
  <div class="brand">
    <img src="/images/cts-logo.png" alt="CTS logo">
    <span>CTS fantasy WC '26</span>
  </div>

  <nav class="nav" data-nav></nav>
</header>
  <main class="container">
    <div class="toolbar">
      <div>
        <h1>Tip</h1>
        <p>Zadej nebo uprav svůj tip nejpozději 5 minut před výkopem.</p>
      </div>
      <input id="filterInput" placeholder="Filtrovat tým, město, kolo...">
    </div>
    <div id="matches" class="match-list"></div>
  </main>
  <script type="module">
    import { api, escapeHtml, flagSpan, formatKickoff, requireLogin, setMessage } from '/common.js';

    const list = document.getElementById('matches');
    const filterInput = document.getElementById('filterInput');
    let matches = [];

    const CZECH_PLAYERS = {
      'Brankáři':  ['Lukáš Horníček', 'Matěj Kovář', 'Jindřich Staněk'],
      'Obránci':   ['Vladimír Coufal', 'David Doudera', 'Tomáš Holeš', 'Robin Hranáč', 'Štěpán Chaloupek', 'David Jurásek', 'Ladislav Krejčí', 'Jaroslav Zelený', 'David Zima'],
      'Záložníci': ['Lukáš Červ', 'Vladimír Darida', 'Lukáš Provod', 'Michal Sadílek', 'Hugo Sochůrek', 'Alexandr Sojka', 'Tomáš Souček', 'Pavel Šulc', 'Denis Višinský'],
      'Útočníci':  ['Adam Hložek', 'Tomáš Chorý', 'Mojmír Chytil', 'Jan Kuchta', 'Patrik Schick'],
    };

    function isCzechMatch(match) {
      return match.teamHome === 'Czech Republic' || match.teamAway === 'Czech Republic';
    }

    function matchSection(match) {
      const num = parseInt(match.round.replace('Matchday ', ''), 10);
      if (!isNaN(num)) {
        if (num <= 7) return '1. kolo skupinové fáze';
        if (num <= 13) return '2. kolo skupinové fáze';
        return '3. kolo skupinové fáze';
      }
      return 'Vyřazovací fáze';
    }

    const SECTION_ORDER = ['1. kolo skupinové fáze', '2. kolo skupinové fáze', '3. kolo skupinové fáze', 'Vyřazovací fáze'];

    function render() {
      const filter = filterInput.value.trim().toLowerCase();
      const visible = matches
        .filter((match) => {
          const text = `${match.teamHome} ${match.teamAway} ${match.venue} ${match.round} ${match.group || ''}`.toLowerCase();
          return !filter || text.includes(filter);
        })
        .sort((a, b) => new Date(a.kickoffUtc) - new Date(b.kickoffUtc));

      if (!visible.length) {
        list.innerHTML = `<div class="empty">Žádné zápasy nenalezeny.</div>`;
        return;
      }

      const sections = new Map();
      for (const match of visible) {
        const section = matchSection(match);
        if (!sections.has(section)) sections.set(section, []);
        sections.get(section).push(match);
      }

      const lockedSections = new Set(
        [...sections.entries()]
          .filter(([, sectionMatches]) => sectionMatches.some((m) => m.tip?.isCaptain && (m.finished || m.locked)))
          .map(([name]) => name)
      );

      const orderedSections = SECTION_ORDER.filter((s) => sections.has(s));
      list.innerHTML = orderedSections.map((section) => `
        <section class="round-section">
          <h2 class="round-heading">${escapeHtml(section)}${lockedSections.has(section) ? ' <span class="round-locked">🔒 kapitán uzamčen</span>' : ''}</h2>
          ${sections.get(section).map((match) => matchCard(match, lockedSections.has(matchSection(match)))).join('')}
        </section>
      `).join('');

      document.querySelectorAll('[data-tip-form]').forEach((form) => {
        form.addEventListener('submit', submitTip);
      });
      document.querySelectorAll('[data-captain-btn]').forEach((btn) => {
        btn.addEventListener('click', toggleCaptain);
      });
      document.querySelectorAll('[data-bonus-save]').forEach((btn) => {
        btn.addEventListener('click', saveBonusTip);
      });
    }

    function matchCard(match, sectionLocked = false) {
      const statusClass = match.finished ? 'finished' : match.locked ? 'locked' : '';
      const statusLabel = match.finished ? `Dokončeno ${match.homeScore}:${match.awayScore}` : match.locked ? 'Uzamčeno' : 'Otevřeno';
      const tip = match.tip || {};
      const disabled = match.locked || match.finished ? 'disabled' : '';
      const isCaptain = tip.isCaptain ?? false;
      const hasScore = match.tip !== null && tip.homeScore !== null && tip.awayScore !== null;
      const points = match.tip?.points ?? null;
      const tipNote = match.finished && hasScore
        ? `Tvůj tip: ${tip.homeScore}:${tip.awayScore}${isCaptain ? ' 👑' : ''} · ${points} ${points === 1 ? 'bod' : points >= 2 && points <= 4 ? 'body' : 'bodů'}${isCaptain ? ' (2×)' : ''}`
        : hasScore
          ? `Uložený tip: ${tip.homeScore}:${tip.awayScore}${isCaptain ? ' 👑' : ''}`
          : match.locked
            ? 'Tip již nelze měnit.'
            : 'Tip zatím nezadán.';

      const captainDisabled = match.locked || sectionLocked;
      const captainSlot = match.finished
        ? '<span></span>'
        : `<button type="button"
            class="captain-btn ${isCaptain ? 'active' : ''}"
            data-captain-btn
            data-match-id="${match.id}"
            data-is-captain="${isCaptain}"
            ${captainDisabled ? 'disabled' : ''}
            title="${sectionLocked ? 'Kolo uzamčeno — kapitán nelze změnit' : isCaptain ? 'Odebrat kapitána' : 'Označit jako kapitán (2× body)'}"
          >👑</button>`;

      const saveBtn = match.finished ? '' : `<button type="submit" ${match.locked ? 'disabled' : ''}>Uložit tip</button>`;

      const bonusPanel = isCzechMatch(match) ? (() => {
        const current = tip.bonusPlayer ?? '';
        const canEdit = !match.locked && !match.finished;
        const playerOptions = Object.entries(CZECH_PLAYERS).map(([pos, players]) =>
          `<optgroup label="${pos}">${players.map(p => `<option value="${p}" ${p === current ? 'selected' : ''}>${p}</option>`).join('')}</optgroup>`
        ).join('');
        const bonusResult = match.finished && current
          ? (tip.bonusHit
              ? `<span class="bonus-result hit">✓ +2 body</span>`
              : `<span class="bonus-result miss">✗ nestřelil</span>`)
          : '';
        return `
          <div class="bonus-tip">
            <div class="bonus-header">
              <span class="bonus-label">🎯 Bonusový tip — střelec</span>
              ${current ? `<span class="bonus-current">${escapeHtml(current)}</span>` : ''}
              ${bonusResult}
            </div>
            ${!match.finished ? `<div class="bonus-body">
              <select class="bonus-select" data-bonus-select data-match-id="${match.id}" ${!canEdit ? 'disabled' : ''}>
                <option value="">— vyber hráče —</option>
                ${playerOptions}
              </select>
              ${canEdit ? `<button type="button" class="bonus-save-btn" data-bonus-save data-match-id="${match.id}">Uložit</button>` : ''}
              <div class="tip-note" id="bonus-note-${match.id}"></div>
            </div>` : ''}
          </div>`;
      })() : '';

      return `
        <article class="match-card ${match.locked ? 'locked' : ''}">
          <div>
            <span class="badge ${statusClass}">${escapeHtml(statusLabel)}</span>
            <div class="teams">
              <div class="team">${flagSpan(match.homeFlag)} <span>${escapeHtml(match.teamHome)}</span></div>
              <div class="team">${flagSpan(match.awayFlag)} <span>${escapeHtml(match.teamAway)}</span></div>
            </div>
          </div>
          <div class="details">
            <b>${escapeHtml(match.round)}</b>${match.group ? ` · ${escapeHtml(match.group)}` : ''}<br>
            ${escapeHtml(formatKickoff(match.kickoffUtc))}<br>
            ${escapeHtml(match.venue)}
          </div>
          <form class="tip-form" data-tip-form data-match-id="${match.id}">
            ${captainSlot}
            <input type="number" min="0" max="99" name="homeScore" value="${tip.homeScore ?? ''}" ${disabled} required aria-label="Home score">
            <span class="dash">:</span>
            <input type="number" min="0" max="99" name="awayScore" value="${tip.awayScore ?? ''}" ${disabled} required aria-label="Away score">
            ${saveBtn}
            <div class="tip-note" id="tip-note-${match.id}">${escapeHtml(tipNote)}</div>
          </form>
          ${bonusPanel}
        </article>`;
    }

    async function submitTip(event) {
      event.preventDefault();
      const form = event.currentTarget;
      const matchId = form.dataset.matchId;
      const note = document.getElementById(`tip-note-${matchId}`);
      const body = Object.fromEntries(new FormData(form));

      try {
        await api(`/api/tips/${matchId}`, { method: 'POST', body });
        setMessage(note, 'Saved.', 'success');
        await loadMatches(false);
      } catch (error) {
        setMessage(note, error.message, 'error');
      }
    }

    async function saveBonusTip(event) {
      const btn = event.currentTarget;
      const matchId = btn.dataset.matchId;
      const select = document.querySelector(`[data-bonus-select][data-match-id="${matchId}"]`);
      const note = document.getElementById(`bonus-note-${matchId}`);
      try {
        await api(`/api/tips/${matchId}/bonus`, { method: 'POST', body: { bonusPlayer: select.value } });
        setMessage(note, select.value ? `Uloženo: ${select.value}` : 'Bonusový tip odebán.', 'success');
        await loadMatches(false);
      } catch (error) {
        setMessage(note, error.message, 'error');
      }
    }

    async function toggleCaptain(event) {
      const btn = event.currentTarget;
      const matchId = btn.dataset.matchId;
      const isCaptain = btn.dataset.isCaptain === 'true';
      const note = document.getElementById(`tip-note-${matchId}`);
      try {
        if (isCaptain) {
          await api(`/api/tips/${matchId}/captain`, { method: 'DELETE' });
        } else {
          await api(`/api/tips/${matchId}/captain`, { method: 'POST' });
        }
        await loadMatches(false);
      } catch (error) {
        if (note) setMessage(note, error.message, 'error');
      }
    }

    async function loadMatches(showLoading = true) {
      if (showLoading) list.innerHTML = `<div class="empty">Loading matches...</div>`;
      const data = await api('/api/matches');
      matches = data.matches;
      render();
    }

    filterInput.addEventListener('input', render);

    await requireLogin();
    await loadMatches();
  </script>
<div class="bottom-mascot">
  <img src="/images/zdenek.png" alt="Zdenek" />
  <span>Good luck!</span>
</div>
</body>
</html>
