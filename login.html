<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | CTS fantasy WC '26</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="page">
    <img src="/images/cts-logo.png" alt="CTS logo" class="logo-top-right" />

    <div class="card">
      <img src="/images/zdenek.png" alt="Profile photo" class="avatar" />

      <h1>CTS fantasy WC '26</h1>
      <p>Login to your fantasy football app</p>

      <form id="loginForm">
        <input type="text" name="nickname" placeholder="Nickname" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>

      <p id="message"></p>

      <div class="small-text">
        Don’t have an account? <a href="/register.html">Register here</a>
      </div>
    </div>
  </div>

  <script src="/login.js"></script>
</body>
</html>
