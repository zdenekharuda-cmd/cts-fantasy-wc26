<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin | CTS fantasy WC '26</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons/css/flag-icons.min.css">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="logo">CTS fantasy WC '26</div>
    <nav class="nav" data-nav></nav>
  </header>
  <main class="container">
    <section class="card">
      <h1>Admin</h1>
      <p>Synchronizace zápasů a ruční zadání výsledků.</p>
      <div class="form-actions">
        <button id="syncBtn">Synchronizovat zápasy</button>
        <button id="syncResultsBtn">Stáhnout výsledky</button>
      </div>
      <div id="message" class="message"></div>
    </section>
    <section class="card" style="margin-top:18px;">
      <div class="toolbar">
        <h2>Zadání výsledků</h2>
        <input id="filterInput" placeholder="Filtrovat tým, město, kolo...">
      </div>
      <div id="matches" class="match-list"></div>
    </section>
  </main>
  <script type="module">
    import { api, escapeHtml, flagSpan, formatKickoff, requireLogin, setMessage } from '/common.js';

    const CZECH_PLAYERS_FLAT = [
      'Lukáš Horníček','Matěj Kovář','Jindřich Staněk',
      'Vladimír Coufal','David Doudera','Tomáš Holeš','Robin Hranáč','Štěpán Chaloupek','David Jurásek','Ladislav Krejčí','Jaroslav Zelený','David Zima',
      'Lukáš Červ','Vladimír Darida','Lukáš Provod','Michal Sadílek','Hugo Sochůrek','Alexandr Sojka','Tomáš Souček','Pavel Šulc','Denis Višinský',
      'Adam Hložek','Tomáš Chorý','Mojmír Chytil','Jan Kuchta','Patrik Schick',
    ];

    const syncBtn = document.getElementById('syncBtn');
    const syncResultsBtn = document.getElementById('syncResultsBtn');
    const message = document.getElementById('message');
    const list = document.getElementById('matches');
    const filterInput = document.getElementById('filterInput');
    let matches = [];

    const ADMIN_FINISHED_KEY = 'admin_finished_expanded';
    let finishedExpanded = localStorage.getItem(ADMIN_FINISHED_KEY) === 'true';

    function adminHeaders() {
      return {};
    }

    syncBtn.addEventListener('click', async () => {
      try {
        const result = await api('/api/admin/sync', { method: 'POST', headers: adminHeaders() });
        setMessage(message, `Synced ${result.count} matches (${result.finished} finished).`, 'success');
        await loadMatches();
      } catch (error) {
        setMessage(message, error.message, 'error');
      }
    });

    syncResultsBtn.addEventListener('click', async () => {
      syncResultsBtn.disabled = true;
      syncResultsBtn.textContent = 'Stahuji...';
      try {
        const result = await api('/api/admin/sync-results', { method: 'POST', headers: adminHeaders() });
        setMessage(message, `Staženo: ${result.updated} nových výsledků, ${result.skipped} přeskočeno (z ${result.total} dokončených).`, 'success');
        await loadMatches(false);
      } catch (error) {
        setMessage(message, error.message, 'error');
      } finally {
        syncResultsBtn.disabled = false;
        syncResultsBtn.textContent = 'Stáhnout výsledky';
      }
    });

    function matchCard(match, hidden = false) {
      return `
        <article class="match-card" ${hidden ? 'style="display:none"' : ''}>
          <div class="teams">
            <div class="team">${flagSpan(match.homeFlag)} <span>${escapeHtml(match.teamHome)}</span></div>
            <div class="team">${flagSpan(match.awayFlag)} <span>${escapeHtml(match.teamAway)}</span></div>
          </div>
          <div class="details">
            <b>${escapeHtml(match.round)}</b>${match.group ? ` · ${escapeHtml(match.group)}` : ''}<br>
            ${escapeHtml(formatKickoff(match.kickoffUtc))}<br>
            ${escapeHtml(match.venue)}<br>
            Stav: <b>${escapeHtml(match.status === 'FINISHED' ? 'Dokončeno' : match.status === 'SCHEDULED' ? 'Naplánováno' : match.status)}</b>
          </div>
          <form class="result-form" data-result-form data-match-id="${match.id}">
            <input type="number" min="0" max="99" name="homeScore" value="${match.homeScore ?? ''}" required aria-label="Home final score">
            <span class="dash">:</span>
            <input type="number" min="0" max="99" name="awayScore" value="${match.awayScore ?? ''}" required aria-label="Away final score">
            <button type="submit">Uložit výsledek</button>
            ${match.status === 'FINISHED' ? `<button type="button" class="btn-unfinish" data-unfinish data-match-id="${match.id}">Zrušit výsledek</button>` : ''}
            <div class="tip-note" id="result-note-${match.id}"></div>
          </form>
          ${(match.teamHome === 'Czech Republic' || match.teamAway === 'Czech Republic') ? `
          <div class="scorers-panel" data-match-id="${match.id}">
            <div class="scorers-label">🇨🇿 Střelci Česka</div>
            <ul class="scorers-list" id="scorers-list-${match.id}">
              ${(match.czechScorers || []).map(s => `
                <li>
                  ${escapeHtml(s)}
                  <button type="button" class="scorer-remove" data-remove-scorer data-match-id="${match.id}" data-player="${escapeHtml(s)}">×</button>
                </li>`).join('') || '<li class="muted">Žádní střelci</li>'}
            </ul>
            <div class="scorers-add">
              <select class="scorer-select" id="scorer-select-${match.id}">
                <option value="">— vyber hráče —</option>
                ${CZECH_PLAYERS_FLAT.map(p => `<option value="${p}">${escapeHtml(p)}</option>`).join('')}
              </select>
              <button type="button" class="scorer-add-btn" data-add-scorer data-match-id="${match.id}">Přidat</button>
            </div>
            <div class="tip-note" id="scorers-note-${match.id}"></div>
          </div>` : ''}
        </article>`;
    }

    function render() {
      const filter = filterInput.value.trim().toLowerCase();
      const visible = matches.filter((match) => {
        const text = `${match.teamHome} ${match.teamAway} ${match.venue} ${match.round} ${match.group || ''}`.toLowerCase();
        return !filter || text.includes(filter);
      });

      if (!visible.length) {
        list.innerHTML = `<div class="empty">No matches found.</div>`;
        return;
      }

      const pending = visible.filter((m) => m.status !== 'FINISHED');
      const finished = visible.filter((m) => m.status === 'FINISHED');
      const collapsed = !filter && !finishedExpanded;

      const finishedSection = finished.length ? `
        <section class="round-section">
          <h2 class="round-heading">Dokončené zápasy
            <button type="button" class="collapse-btn" id="finishedCollapseBtn">
              ${collapsed ? `▶ Zobrazit (${finished.length})` : `▼ Skrýt (${finished.length})`}
            </button>
          </h2>
          ${finished.map((m) => matchCard(m, collapsed)).join('')}
        </section>` : '';

      list.innerHTML = finishedSection + pending.map((m) => matchCard(m)).join('');

      document.getElementById('finishedCollapseBtn')?.addEventListener('click', () => {
        finishedExpanded = !finishedExpanded;
        localStorage.setItem(ADMIN_FINISHED_KEY, finishedExpanded);
        render();
      });
      document.querySelectorAll('[data-result-form]').forEach((form) => form.addEventListener('submit', saveResult));
      document.querySelectorAll('[data-unfinish]').forEach((btn) => btn.addEventListener('click', unfinishMatch));
      document.querySelectorAll('[data-add-scorer]').forEach((btn) => btn.addEventListener('click', addScorer));
      document.querySelectorAll('[data-remove-scorer]').forEach((btn) => btn.addEventListener('click', removeScorer));
    }

    async function saveResult(event) {
      event.preventDefault();
      const form = event.currentTarget;
      const matchId = form.dataset.matchId;
      const note = document.getElementById(`result-note-${matchId}`);
      const body = Object.fromEntries(new FormData(form));
      try {
        await api(`/api/admin/matches/${matchId}/result`, { method: 'POST', headers: adminHeaders(), body });
        setMessage(note, 'Výsledek uložen.', 'success');
        await loadMatches(false);
      } catch (error) {
        setMessage(note, error.message, 'error');
      }
    }

    function getScorersForMatch(matchId) {
      const match = matches.find((m) => m.id === Number(matchId));
      return match?.czechScorers ?? [];
    }

    async function saveScorers(matchId, scorers) {
      const note = document.getElementById(`scorers-note-${matchId}`);
      try {
        await api(`/api/admin/matches/${matchId}/scorers`, { method: 'POST', headers: adminHeaders(), body: { scorers } });
        setMessage(note, 'Uloženo.', 'success');
        await loadMatches(false);
      } catch (error) {
        setMessage(note, error.message, 'error');
      }
    }

    async function addScorer(event) {
      const matchId = event.currentTarget.dataset.matchId;
      const select = document.getElementById(`scorer-select-${matchId}`);
      const player = select.value;
      if (!player) return;
      const current = getScorersForMatch(matchId);
      if (current.includes(player)) return;
      await saveScorers(matchId, [...current, player]);
    }

    async function removeScorer(event) {
      const { matchId, player } = event.currentTarget.dataset;
      const current = getScorersForMatch(matchId);
      await saveScorers(matchId, current.filter((s) => s !== player));
    }

    async function unfinishMatch(event) {
      const btn = event.currentTarget;
      const matchId = btn.dataset.matchId;
      const note = document.getElementById(`result-note-${matchId}`);
      try {
        await api(`/api/admin/matches/${matchId}/result`, { method: 'DELETE', headers: adminHeaders() });
        setMessage(note, 'Výsledek zrušen.', 'success');
        await loadMatches(false);
      } catch (error) {
        setMessage(note, error.message, 'error');
      }
    }

    async function loadMatches(showLoading = true) {
      if (showLoading) list.innerHTML = `<div class="empty">Loading matches...</div>`;
      const data = await api('/api/matches');
      matches = data.matches;
      render();
    }

    filterInput.addEventListener('input', render);
    await requireLogin();
    try {
      await api('/api/admin/check');
    } catch {
      window.location.href = '/login.html';
      throw new Error('not admin');
    }
    await loadMatches();
  </script>
</body>
</html>
