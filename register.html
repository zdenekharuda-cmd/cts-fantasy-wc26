<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registration | CTS fantasy WC '26</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons/css/flag-icons.min.css">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="page">
    <img src="/images/cts-logo.png" alt="CTS logo" class="logo-top-right" />

    <div class="card">
      <img src="/images/zdenek.png" alt="Profile photo" class="avatar" />

      <h1>Register</h1>
      <p>Create your account for CTS fantasy WC '26</p>

      <form id="registerForm">
        <input type="text" name="name" placeholder="Full name" required />
        <input type="text" name="nickname" placeholder="Nickname" required />
        <input type="email" name="email" placeholder="Email" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Create account</button>
      </form>

      <div class="small-text">
        Already have an account? <a href="/login.html">Login here</a>
      </div>
    </div>
  </div>

  <script src="/register.js"></script>
</body>
</html>
