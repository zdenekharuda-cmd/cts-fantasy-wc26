<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrace | CTS fantasy WC '26</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="page">
    <img src="/images/cts-logo.png" alt="CTS logo" class="logo-top-right" />

    <div class="card">
      <img src="/images/zdenek.png" alt="Profile photo" class="avatar" />

      <h1>Registrace</h1>
      <p>Vytvoř si účet pro CTS fantasy WC '26</p>

      <form id="registerForm">
        <input type="text" name="name" placeholder="Celé jméno" required />
        <input type="text" name="nickname" placeholder="Přezdívka" required />
        <input type="password" name="inviteCode" placeholder="Vstupní heslo" required />
        <input type="password" name="password" placeholder="Heslo k účtu" required />
        <button type="submit">Vytvořit účet</button>
      </form>

      <p id="message"></p>

      <div class="small-text">
        Už máš účet? <a href="/login.html">Přihlas se</a>
      </div>
    </div>
  </div>

  <script src="/register.js"></script>
</body>
</html>
