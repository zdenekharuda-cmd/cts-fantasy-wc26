<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registration | CTS fantasy WC '26</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons/css/flag-icons.min.css">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="logo">CTS fantasy WC '26</div>
    <nav class="nav" data-nav></nav>
  </header>
  <main class="container">
    <section class="card narrow">
      <h1>Registration</h1>
      <p>Create your company fantasy account.</p>
      <form id="registerForm">
        <label for="name">Name</label>
        <input id="name" name="name" autocomplete="name" required>
        <label for="nickname">Nickname</label>
        <input id="nickname" name="nickname" autocomplete="username" required>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required>
        <div class="form-actions">
          <button type="submit">Register</button>
          <a href="/login.html">Already registered?</a>
        </div>
        <div id="message" class="message"></div>
      </form>
    </section>
  </main>
  <script type="module">
    import { api, setMessage } from '/common.js';
    const form = document.getElementById('registerForm');
    const message = document.getElementById('message');
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const body = Object.fromEntries(new FormData(form));
      try {
        await api('/api/register', { method: 'POST', body });
        window.location.href = '/tips.html';
      } catch (error) {
        setMessage(message, error.message, 'error');
      }
    });
  </script>
</body>
</html>
